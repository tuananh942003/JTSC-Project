<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Primary Meta Tags -->
    <title>JTSC – Giải pháp Công nghệ Thông minh tại Việt Nam</title>
    <meta name="title" content="JTSC – Giải pháp Công nghệ Thông minh tại Việt Nam" />
    <meta name="description" content="JTSC cung cấp các giải pháp công nghệ thông tin hàng đầu: phần mềm doanh nghiệp, ứng dụng web & mobile, AI, và tư vấn chuyển đổi số cho doanh nghiệp Việt Nam." />
    <meta name="keywords" content="JTSC, giải pháp công nghệ, phần mềm doanh nghiệp, chuyển đổi số, ứng dụng web, ứng dụng mobile, AI, phát triển phần mềm, công ty công nghệ Việt Nam" />
    <meta name="author" content="JTSC" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    <link rel="canonical" href="https://jtsc.vn/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jtsc.vn/" />
    <meta property="og:title" content="JTSC – Giải pháp Công nghệ Thông minh tại Việt Nam" />
    <meta property="og:description" content="JTSC cung cấp các giải pháp công nghệ thông tin hàng đầu: phần mềm doanh nghiệp, ứng dụng web & mobile, AI, và tư vấn chuyển đổi số." />
    <meta property="og:image" content="https://jtsc.vn/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="vi_VN" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:site_name" content="JTSC" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://jtsc.vn/" />
    <meta name="twitter:title" content="JTSC – Giải pháp Công nghệ Thông minh tại Việt Nam" />
    <meta name="twitter:description" content="JTSC cung cấp các giải pháp công nghệ thông tin hàng đầu: phần mềm doanh nghiệp, ứng dụng web & mobile, AI, và tư vấn chuyển đổi số." />
    <meta name="twitter:image" content="https://jtsc.vn/og-image.png" />

    <!-- Geo -->
    <meta name="geo.region" content="VN" />
    <meta name="geo.placename" content="Việt Nam" />

    <!-- Structured Data – Organization (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "JTSC",
      "url": "https://jtsc.vn",
      "logo": "https://jtsc.vn/logo.png",
      "description": "JTSC cung cấp giải pháp công nghệ thông tin: phần mềm doanh nghiệp, ứng dụng web & mobile, AI và chuyển đổi số.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "VN"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": ["Vietnamese", "English"]
      },
      "sameAs": []
    }
    </script>

    <!-- Structured Data – Website Search -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "JTSC",
      "url": "https://jtsc.vn",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://jtsc.vn/news?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>
  <body>
    <script>
      // Apply saved theme before React renders to prevent flash
      (function(){var t=localStorage.getItem('theme');if(!t){t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'}document.documentElement.setAttribute('data-theme',t)})();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
